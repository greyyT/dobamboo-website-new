commands:
  install: yarn install
  build: yarn build
  lint: yarn lint
  dev: PORT=3100 yarn dev
  prisma-generate: npx prisma generate

services:
  web:
    start: PORT=3100 yarn dev
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/en
    port: 3100
    depends_on: []
